services:
  app:
    build: 
      context: .
      dockerfile: ./container/app/Dockerfile
    ports:
      - 3000:3000
      - 6006:6006
    tty: true
    stdin_open: true
    volumes:
      - ./src:/home/node/app
  
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - ./container/db/data:/var/lib/postgresql/data
